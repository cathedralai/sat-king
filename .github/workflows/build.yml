name: build-champion
on:
  push:
    branches: [main]
  workflow_dispatch: {}
permissions:
  contents: read
  packages: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        id: push
        with:
          context: .
          push: true
          tags: |
            ghcr.io/cathedralai/sat-king:v0
            ghcr.io/cathedralai/sat-king:kissat-4.0.2
      - name: digest
        run: 'echo "IMAGE DIGEST => ${{ steps.push.outputs.digest }}"'
